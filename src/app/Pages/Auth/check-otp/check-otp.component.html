<div class="auth-card">
  <!-- Header -->
  <div class="auth-card__header">
    <div class="auth-card__icon">
      <i class="pi pi-shield"></i>
    </div>
    <h1 class="auth-card__title">Verify OTP</h1>
    <p class="auth-card__subtitle">
      Enter the one-time password sent to your email
    </p>
  </div>

  <!-- Form -->
  <form class="auth-card__form" [formGroup]="otpForm" (ngSubmit)="onSubmit()">
    <!-- OTP -->
    <div class="form-field">
      <label class="form-field__label" for="otpCode">OTP Code</label>
      <div
        class="form-field__input-wrapper"
        [class.form-field__input-wrapper--error]="otp?.invalid && otp?.touched"
      >
        <i class="pi pi-key form-field__icon"></i>
        <input
          class="form-field__input"
          id="otpCode"
          type="text"
          formControlName="otp"
          placeholder="Enter OTP code"
          autocomplete="one-time-code"
        />
      </div>
      <div class="form-field__error" *ngIf="otp?.invalid && otp?.touched">
        <span *ngIf="otp?.errors?.['required']">OTP code is required</span>
      </div>
    </div>

    <!-- Submit -->
    <button class="auth-card__btn" type="submit" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting">Verify OTP</span>
      <span *ngIf="isSubmitting" class="auth-card__spinner">
        <i class="pi pi-spin pi-spinner"></i> Verifying...
      </span>
    </button>
  </form>

  <!-- Footer -->
  <div class="auth-card__footer">
    <p>
      <a class="auth-card__link" routerLink="/#">Resend OTP</a> ·
      <a class="auth-card__link" routerLink="/login">Back to Sign in</a>
    </p>
  </div>
</div>
