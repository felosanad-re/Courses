<div class="auth-card">
  <!-- Header -->
  <div class="auth-card__header">
    <div class="auth-card__icon" [class.auth-card__icon--success]="confirmationSuccess">
      <i class="pi" [ngClass]="confirmationSuccess ? 'pi-check-circle' : 'pi-spin pi-spinner'"></i>
    </div>
    <h1 class="auth-card__title">
      {{ confirmationSuccess ? 'Account Confirmed!' : errorMessage ? 'Confirmation Failed' : 'Confirming Account...' }}
    </h1>
    <p class="auth-card__subtitle">
      <span *ngIf="confirmationSuccess">Your account has been verified successfully. Redirecting to login...</span>
      <span *ngIf="errorMessage && !confirmationSuccess">{{ errorMessage }}</span>
      <span *ngIf="!errorMessage && !confirmationSuccess">Please wait while we verify your account.</span>
    </p>
  </div>

  <!-- Success Actions -->
  <div *ngIf="confirmationSuccess" class="auth-card__form">
    <button class="auth-card__btn" routerLink="/login">
      Go to Login
    </button>
  </div>

  <!-- Error Actions -->
  <div *ngIf="errorMessage && !confirmationSuccess" class="auth-card__form">
    <button class="auth-card__btn" routerLink="/register">
      Register Again
    </button>
  </div>

  <!-- Footer -->
  <div class="auth-card__footer">
    <p><a class="auth-card__link" routerLink="/login">Back to Sign in</a></p>
  </div>
</div>
