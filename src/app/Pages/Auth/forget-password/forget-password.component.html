<div class="auth-card">
  <!-- Header -->
  <div class="auth-card__header">
    <div class="auth-card__icon">
      <i class="pi pi-unlock"></i>
    </div>
    <h1 class="auth-card__title">Reset Password</h1>
    <p class="auth-card__subtitle">Enter your new password</p>
  </div>

  <!-- Form -->
  <form
    class="auth-card__form"
    [formGroup]="forgetPasswordForm"
    (ngSubmit)="onSubmit()"
  >
    <!-- Password -->
    <div class="form-field">
      <label class="form-field__label" for="password">New Password</label>
      <div
        class="form-field__input-wrapper"
        [class.form-field__input-wrapper--error]="
          password?.invalid && password?.touched
        "
      >
        <i class="pi pi-lock form-field__icon"></i>
        <input
          class="form-field__input"
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter new password"
          autocomplete="new-password"
        />
      </div>
      <div class="form-field__error" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">Password is required</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 8 characters</span>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-field">
      <label class="form-field__label" for="confirmPassword">Confirm Password</label>
      <div
        class="form-field__input-wrapper"
        [class.form-field__input-wrapper--error]="
          confirmPassword?.invalid && confirmPassword?.touched
        "
      >
        <i class="pi pi-lock form-field__icon"></i>
        <input
          class="form-field__input"
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirm new password"
          autocomplete="new-password"
        />
      </div>
      <div class="form-field__error" *ngIf="confirmPassword?.invalid && confirmPassword?.touched">
        <span *ngIf="confirmPassword?.errors?.['required']">Confirm password is required</span>
        <span *ngIf="forgetPasswordForm.errors?.['mismatch']">Passwords do not match</span>
      </div>
    </div>

    <!-- Submit -->
    <button class="auth-card__btn" type="submit" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting">Reset Password</span>
      <span *ngIf="isSubmitting" class="auth-card__spinner">
        <i class="pi pi-spin pi-spinner"></i> Processing...
      </span>
    </button>
  </form>

  <!-- Footer -->
  <div class="auth-card__footer">
    <p>
      Remember your password?
      <a class="auth-card__link auth-card__link--bold" routerLink="/login"
        >Sign in</a
      >
    </p>
  </div>
</div>
