<div class="auth-card">
  <!-- Header -->
  <div class="auth-card__header">
    <div class="auth-card__icon">
      <i class="pi pi-unlock"></i>
    </div>
    <h1 class="auth-card__title">Reset Password</h1>
    <p class="auth-card__subtitle">Enter your email to receive a reset code</p>
  </div>

  <!-- Form -->
  <form
    class="auth-card__form"
    [formGroup]="forgetPasswordForm"
    (ngSubmit)="onSubmit()"
  >
    <!-- Email -->
    <div class="form-field">
      <label class="form-field__label" for="forgetEmail">Email Address</label>
      <div
        class="form-field__input-wrapper"
        [class.form-field__input-wrapper--error]="
          email?.invalid && email?.touched
        "
      >
        <i class="pi pi-envelope form-field__icon"></i>
        <input
          class="form-field__input"
          id="forgetEmail"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <div class="form-field__error" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">Email is required</span>
        <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
      </div>
    </div>

    <!-- Submit -->
    <button class="auth-card__btn" type="submit" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting">Send Reset Code</span>
      <span *ngIf="isSubmitting" class="auth-card__spinner">
        <i class="pi pi-spin pi-spinner"></i> Sending...
      </span>
    </button>
  </form>

  <!-- Footer -->
  <div class="auth-card__footer">
    <p>
      Remember your password?
      <a class="auth-card__link auth-card__link--bold" routerLink="/login"
        >Sign in</a
      >
    </p>
  </div>
</div>
