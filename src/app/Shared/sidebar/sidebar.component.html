<!-- 
  Sidebar Component - Standalone reusable component
  All state (open/collapsed) is controlled by the parent via Input bindings.
  User interactions emit Output events back to the parent for state management.
-->

<!-- Overlay: visible on mobile when sidebar is open, clicking it closes the sidebar -->
<div
  class="sidebar-overlay"
  [class.sidebar-overlay--active]="isSidebarOpen"
  (click)="onToggleSidebar()"
></div>

<!-- Sidebar container: open/collapsed states are driven by parent Input bindings -->
<aside
  class="sidebar"
  [class.sidebar--open]="isSidebarOpen"
  [class.sidebar--collapsed]="isSidebarCollapsed"
>
  <!-- Header: user info + collapse/close buttons -->
  <div class="sidebar__header">
    <div
      class="sidebar__user-info"
      [class.sidebar__user-info--collapsed]="isSidebarCollapsed"
    >
      <div class="sidebar__user-avatar">
        <i class="pi pi-user"></i>
      </div>
      <div class="sidebar__user-details">
        <!-- userName & userRole are passed from parent via Input -->
        <span class="sidebar__user-name">{{ userName }}</span>
        <span class="sidebar__user-role">{{ userRole }}</span>
      </div>
    </div>
    <!-- Collapse button: emits event to parent to toggle collapsed state -->
    <button class="sidebar__collapse" (click)="onToggleSidebarCollapse()">
      <i
        [class]="isSidebarCollapsed ? 'pi pi-angle-right' : 'pi pi-angle-left'"
      ></i>
    </button>
    <!-- Close button: emits event to parent to close sidebar (mainly for mobile) -->
    <button class="sidebar__close" (click)="onToggleSidebar()">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <!-- Navigation: navItems are passed from parent via Input -->
  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__link"
        [routerLink]="item.route"
        routerLinkActive="sidebar__link--active"
        (click)="onCloseSidebarOnMobile()"
      >
        <i class="pi {{ item.icon }}"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer: stats section (currently hardcoded, can be made dynamic later) -->
  <div class="sidebar__footer">
    <div class="sidebar__stats">
      <div class="sidebar__stat">
        <span class="sidebar__stat-value">12</span>
        <span class="sidebar__stat-label">Courses</span>
      </div>
      <div class="sidebar__stat">
        <span class="sidebar__stat-value">1.2K</span>
        <span class="sidebar__stat-label">Students</span>
      </div>
      <div class="sidebar__stat">
        <span class="sidebar__stat-value">$4.5K</span>
        <span class="sidebar__stat-label">Earnings</span>
      </div>
    </div>
  </div>
</aside>
