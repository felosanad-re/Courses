<!-- 
  InstructorNavComponent - Navbar + Sidebar wrapper for Instructor role
  
  The sidebar state (isSidebarOpen, isSidebarCollapsed) is owned by this component
  and passed down to <app-sidebar> via Input bindings. When the sidebar emits
  Output events (sidebarToggle, sidebarCollapseToggle, sidebarCloseOnMobile),
  this component handles the actual state changes.
-->

<!-- Main Navbar -->
<nav class="instructor-navbar">
  <div class="instructor-navbar__container">
    <div class="instructor-navbar__left">
      <!-- Menu toggle: emits sidebarToggle to open/close sidebar on mobile -->
      <button class="instructor-navbar__menu-toggle" (click)="toggleSidebar()">
        <i class="pi pi-bars"></i>
      </button>

      <a class="instructor-navbar__brand" routerLink="/instructor/dashboard">
        <div class="instructor-navbar__logo">
          <i class="pi pi-graduation-cap"></i>
        </div>
        <span class="instructor-navbar__name">Coursat</span>
        <span class="instructor-navbar__badge">Instructor</span>
      </a>
    </div>

    <!-- Center: Search -->
    <div class="instructor-navbar__center">
      <div class="instructor-navbar__search">
        <i class="pi pi-search"></i>
        <input
          type="text"
          placeholder="Search courses, students..."
          (input)="onSearch($event)"
        />
      </div>
    </div>

    <!-- Right: Actions -->
    <div class="instructor-navbar__right">
      <button class="instructor-navbar__icon-btn">
        <i class="pi pi-bell"></i>
        <span class="instructor-navbar__notification-dot"></span>
      </button>

      <button class="instructor-navbar__icon-btn">
        <i class="pi pi-envelope"></i>
      </button>

      <div class="instructor-navbar__user">
        <button class="instructor-navbar__user-btn" (click)="toggleUserMenu()">
          <div class="instructor-navbar__avatar">
            <i class="pi pi-user"></i>
          </div>
          <span class="instructor-navbar__username">{{ userName }}</span>
          <i class="pi pi-chevron-down"></i>
        </button>

        <div
          class="instructor-navbar__user-dropdown"
          [class.instructor-navbar__user-dropdown--open]="isUserMenuOpen"
        >
          <a routerLink="/instructor/profile">
            <i class="pi pi-user-edit"></i>
            Profile
          </a>
          <a routerLink="/instructor/settings">
            <i class="pi pi-cog"></i>
            Settings
          </a>
          <hr />
          <button (click)="logout()">
            <i class="pi pi-sign-out"></i>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- 
  Sidebar Component - receives state via Inputs, emits events via Outputs
  
  [isSidebarOpen]     → controls sidebar visibility
  [isSidebarCollapsed] → controls sidebar collapsed (icon-only) mode
  [navItems]          → instructor-specific navigation items
  [userName]          → user display name (from localStorage)
  [userRole]          → user role label
  
  (sidebarToggle)           → emitted when overlay/close is clicked → parent toggles isSidebarOpen
  (sidebarCollapseToggle)   → emitted when collapse btn clicked → parent toggles isSidebarCollapsed + updates service
  (sidebarCloseOnMobile)    → emitted when nav link clicked on mobile → parent closes sidebar
-->
<app-sidebar
  [isSidebarOpen]="isSidebarOpen"
  [isSidebarCollapsed]="isSidebarCollapsed"
  [navItems]="navItems"
  [userName]="userName"
  [userRole]="userRole"
  (sidebarToggle)="toggleSidebar()"
  (sidebarCollapseToggle)="toggleSidebarCollapse()"
  (sidebarCloseOnMobile)="closeSidebarOnMobile()"
/>
